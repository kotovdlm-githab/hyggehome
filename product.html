<script src="assets/js/store.js"></script>
<script>
(function(){
  var CATS = window.HH_CATEGORIES;
  var id = new URLSearchParams(location.search).get("id");
  var p = HH.findProduct(id);
  var root = document.getElementById("root");

  if(!p){
    root.className = "wrap section";
    root.innerHTML = '<div class="empty"><h3>Товар не найден</h3><p>Возможно, он больше не продаётся.</p><a class="btn btn-primary" href="catalog.html">В каталог</a></div>';
    return;
  }

  document.title = p.name + " — hyggehome";
  var c = CATS[p.category];
  var qty = 1;
  var old = p.oldPrice ? '<span class="old">'+HH.price(p.oldPrice)+'</span>' : '';
  var badge = p.tag ? '<span class="badge '+p.tag+'">'+HH.tagLabel(p.tag)+'</span>' : '';

  root.innerHTML =
    '<div class="crumbs"><a href="index.html">Главная</a> <span class="sep">/</span> <a href="catalog.html">Каталог</a> <span class="sep">/</span> <a href="catalog.html?cat='+p.category+'">'+c.name+'</a> <span class="sep">/</span> <span>'+p.name+'</span></div>'
    + '<div class="product">'
    +   '<div class="media">'+badge+HH.thumb(p,true)+'</div>'
    +   '<div class="info">'
    +     '<div class="p-cat">'+(p.sub||c.name)+'</div>'
    +     '<h1>'+p.name+'</h1>'
    +     '<div class="rating"><span class="star" style="color:var(--terra)">★</span> '+(p.rating||"—")+' · в наличии</div>'
    +     '<div class="p-price"><span class="now">'+HH.price(p.price)+'</span>'+old+'</div>'
    +     '<p class="p-desc">'+p.desc+'</p>'
    +     '<div class="buy-row">'
    +       '<div class="qty"><button id="minus" aria-label="убрать">−</button><span id="q">1</span><button id="plus" aria-label="добавить">+</button></div>'
    +       '<button class="btn btn-primary" id="buy">В корзину</button>'
    +     '</div>'
    +     '<div class="p-note"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" style="flex:none;color:var(--terra)"><path d="M3 7h13v10H3zM16 10h4l1 3v4h-5"/><circle cx="7" cy="17" r="2"/><circle cx="18" cy="17" r="2"/></svg>'
    +       '<span>Доставка по России: СДЭК, Ozon, Wildberries, Почта. Бесплатно от '+HH.price(HH.config.delivery.freeFrom)+'. Скидка постоянным покупателям — до 10%.</span></div>'
    +   '</div>'
    + '</div>';

  var qEl = document.getElementById("q");
  document.getElementById("minus").onclick = function(){ qty=Math.max(1,qty-1); qEl.textContent=qty; };
  document.getElementById("plus").onclick = function(){ qty++; qEl.textContent=qty; };
  document.getElementById("buy").onclick = function(){ HH.addToCart(p.id, qty); HH.toast("Добавлено: "+p.name); };

  // похожие
  var sim = HH.getProducts().filter(function(x){return x.category===p.category && x.id!==p.id;}).slice(0,4);
  if(sim.length){
    document.getElementById("similar-wrap").style.display="";
    document.getElementById("similar").innerHTML = sim.map(function(s){
      var o = s.oldPrice ? '<span class="old">'+HH.price(s.oldPrice)+'</span>' : '';
      var b = s.tag ? '<span class="badge '+s.tag+'">'+HH.tagLabel(s.tag)+'</span>' : '';
      return '<div class="card">'+b+'<a href="product.html?id='+s.id+'">'+HH.thumb(s)+'</a>'
        +'<div class="cat-tag">'+(s.sub||CATS[s.category].name)+'</div>'
        +'<h3><a href="product.html?id='+s.id+'">'+s.name+'</a></h3>'
        +'<div class="rating"><span class="star">★</span> '+(s.rating||"—")+'</div>'
        +'<div class="price-row"><span class="price">'+HH.price(s.price)+'</span>'+o+'</div>'
        +'<div class="card-actions"><button class="btn btn-primary btn-sm" data-add="'+s.id+'">В корзину</button>'
        +'<a class="btn btn-ghost btn-sm" href="product.html?id='+s.id+'">Подробнее</a></div></div>';
    }).join("");
  }
})();
</script>
</body>
